services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - PORT=8085
      - BASE_URL=${BASE_URL:-http://localhost:8085}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-shareit}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-shareit}
      - POSTGRES_DB=${POSTGRES_DB:-shareit}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATA_DIR=/data
      - BEHIND_CLOUDFLARE=${BEHIND_CLOUDFLARE:-false}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-786432000}
      - AUTO_DELETE_REPORT_COUNT=${AUTO_DELETE_REPORT_COUNT:-3}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    volumes:
      - /mnt/shareit:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shareit

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-shareit}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-shareit}
      - POSTGRES_DB=${POSTGRES_DB:-shareit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shareit} -d ${POSTGRES_DB:-shareit}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - shareit

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - shareit

volumes:
  file_data:
  postgres_data:
  redis_data:

networks:
  shareit:
    driver: bridge